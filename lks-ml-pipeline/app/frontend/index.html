<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayTech Fraud Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 560px; padding: 36px; }
    h1 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 28px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; font-weight: 600; color: #444; text-transform: uppercase; letter-spacing: 0.03em; }
    input, select { padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 0.9rem; color: #222; transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: #4f6ef7; }
    button { margin-top: 24px; width: 100%; padding: 14px; background: #4f6ef7; color: #fff; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #3a58e0; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .result { margin-top: 24px; border-radius: 10px; padding: 20px; display: none; }
    .result.fraud { background: #fff1f0; border: 2px solid #ff4d4f; }
    .result.normal { background: #f0fff4; border: 2px solid #52c41a; }
    .result-label { font-size: 1.3rem; font-weight: 700; }
    .result.fraud .result-label { color: #cf1322; }
    .result.normal .result-label { color: #237804; }
    .result-score { font-size: 2rem; font-weight: 800; margin: 8px 0; }
    .result.fraud .result-score { color: #ff4d4f; }
    .result.normal .result-score { color: #52c41a; }
    .result-meta { font-size: 0.82rem; color: #666; margin-top: 8px; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-top: 6px; }
    .badge-fraud { background: #ff4d4f22; color: #cf1322; }
    .badge-normal { background: #52c41a22; color: #237804; }
    .error-msg { margin-top: 16px; background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px; font-size: 0.85rem; color: #856404; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛡️ PayTech Fraud Detection</h1>
    <p class="subtitle">PT. Nusantara PayTech — Real-time transaction fraud scoring</p>

    <form id="form">
      <div class="grid">
        <div class="field full">
          <label>Transaction ID</label>
          <input type="text" id="transaction_id" placeholder="txn-001" required />
        </div>
        <div class="field">
          <label>Amount (IDR)</label>
          <input type="number" id="amount" placeholder="500000" min="1" required />
        </div>
        <div class="field">
          <label>Merchant Category</label>
          <select id="merchant_category">
            <option value="grocery">Grocery</option>
            <option value="electronics">Electronics</option>
            <option value="restaurant">Restaurant</option>
            <option value="gas">Gas Station</option>
            <option value="travel">Travel</option>
            <option value="online">Online</option>
          </select>
        </div>
        <div class="field">
          <label>Hour of Day (0–23)</label>
          <input type="number" id="hour_of_day" placeholder="14" min="0" max="23" required />
        </div>
        <div class="field">
          <label>Day of Week (0=Mon)</label>
          <input type="number" id="day_of_week" placeholder="2" min="0" max="6" required />
        </div>
        <div class="field">
          <label>Account Age (days)</label>
          <input type="number" id="user_account_age_days" placeholder="365" min="0" required />
        </div>
        <div class="field">
          <label>Previous Fraud Count</label>
          <input type="number" id="previous_fraud_count" placeholder="0" min="0" required />
        </div>
        <div class="field">
          <label>Distance from Home (km)</label>
          <input type="number" id="distance_from_home_km" placeholder="5.0" min="0" step="0.1" required />
        </div>
        <div class="field">
          <label>Foreign Transaction</label>
          <select id="is_foreign_transaction">
            <option value="0">No</option>
            <option value="1">Yes</option>
          </select>
        </div>
        <div class="field">
          <label>Transactions (24h)</label>
          <input type="number" id="transaction_frequency_24h" placeholder="3" min="1" required />
        </div>
      </div>
      <button type="submit" id="btn">Analyze Transaction</button>
    </form>

    <div id="error" class="error-msg"></div>

    <div id="result" class="result">
      <div class="result-label" id="result-label"></div>
      <div class="result-score" id="result-score"></div>
      <span class="badge" id="result-badge"></span>
      <div class="result-meta" id="result-meta"></div>
    </div>
  </div>

  <script>
    const API_URL = "__API_GATEWAY_URL__";

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      const errorEl = document.getElementById("error");
      const resultEl = document.getElementById("result");
      btn.disabled = true;
      btn.textContent = "Analyzing…";
      errorEl.style.display = "none";
      resultEl.style.display = "none";

      const payload = {
        transaction_id: document.getElementById("transaction_id").value,
        amount: parseFloat(document.getElementById("amount").value),
        merchant_category: document.getElementById("merchant_category").value,
        hour_of_day: parseInt(document.getElementById("hour_of_day").value),
        day_of_week: parseInt(document.getElementById("day_of_week").value),
        user_account_age_days: parseInt(document.getElementById("user_account_age_days").value),
        previous_fraud_count: parseInt(document.getElementById("previous_fraud_count").value),
        distance_from_home_km: parseFloat(document.getElementById("distance_from_home_km").value),
        is_foreign_transaction: parseInt(document.getElementById("is_foreign_transaction").value),
        transaction_frequency_24h: parseInt(document.getElementById("transaction_frequency_24h").value),
      };

      try {
        const resp = await fetch(`${API_URL}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        const isFraud = data.label === "FRAUD";
        resultEl.className = "result " + (isFraud ? "fraud" : "normal");
        document.getElementById("result-label").textContent = isFraud ? "🚨 FRAUD DETECTED" : "✅ NORMAL TRANSACTION";
        document.getElementById("result-score").textContent = (data.fraud_score * 100).toFixed(1) + "%";
        const badge = document.getElementById("result-badge");
        badge.textContent = `Confidence: ${data.confidence}`;
        badge.className = "badge " + (isFraud ? "badge-fraud" : "badge-normal");
        document.getElementById("result-meta").textContent =
          `Transaction: ${data.transaction_id} · ${new Date(data.timestamp).toLocaleString("id-ID")}`;
        resultEl.style.display = "block";
      } catch (err) {
        errorEl.textContent = `Error: ${err.message}. Pastikan API Gateway URL sudah benar.`;
        errorEl.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyze Transaction";
      }
    });
  </script>
</body>
</html>
