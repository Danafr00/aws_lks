# EFS StorageClass — dynamic provisioning via EFS Access Points (efs-ap mode).
# Each PVC gets its own isolated Access Point directory inside the file system.
# Replace <EFS_FILE_SYSTEM_ID> with your actual EFS ID (e.g. fs-0abc1234).
# scripts/02-eks-addons.sh patches this automatically if EFS_ID is set.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com
parameters:
  provisioningMode: efs-ap
  fileSystemId: <EFS_FILE_SYSTEM_ID>
  directoryPerms: "755"
  gidRangeStart: "1000"
  gidRangeEnd: "2000"
  basePath: "/uploads"
reclaimPolicy: Retain
volumeBindingMode: Immediate
