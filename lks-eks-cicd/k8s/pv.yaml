# Static EFS PersistentVolume — references the EFS filesystem directly.
# Static provisioning bypasses the CSI controller (which needs IMDS/IRSA).
# The CSI node DaemonSet mounts via NFS — no EFS API calls, no IAM needed.
# Replace <EFS_FILE_SYSTEM_ID> with your actual EFS ID (e.g. fs-0abc1234).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: wallet-uploads-pv
  labels:
    app: wallet-api
    Project: nusantara-wallet
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: <EFS_FILE_SYSTEM_ID>
